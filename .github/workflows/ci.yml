name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run regression math tests
        run: python tests/test_regression_math.py

      - name: Run smoke tests (offline only)
        run: |
          python tests/smoke_test_logger_1_experiment_logger.py
          python tests/smoke_test_logger_2_convergence.py
          python tests/smoke_test_aggregator_1_fed_avg.py
          python tests/smoke_test_aggregator_2_hierarchical.py